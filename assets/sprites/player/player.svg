<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48">
  <!-- Ground shadow -->
  <ellipse cx="16" cy="45" rx="9" ry="3" fill="#00000050"/>
  <!-- Boots -->
  <rect x="10" y="37" width="5" height="7" rx="1" fill="#2c1a0e"/>
  <rect x="17" y="37" width="5" height="7" rx="1" fill="#2c1a0e"/>
  <!-- Legs (jumpsuit) -->
  <rect x="11" y="27" width="4" height="12" fill="#1a3a5c"/>
  <rect x="17" y="27" width="4" height="12" fill="#1a3a5c"/>
  <!-- Body (jumpsuit) -->
  <rect x="8" y="15" width="16" height="14" rx="2" fill="#1a3a5c"/>
  <!-- Arms -->
  <rect x="3" y="16" width="5" height="9" rx="2" fill="#1a3a5c"/>
  <rect x="24" y="16" width="5" height="9" rx="2" fill="#1a3a5c"/>
  <!-- Hands -->
  <circle cx="5" cy="26" r="3" fill="#f4c2a1"/>
  <circle cx="27" cy="26" r="3" fill="#f4c2a1"/>
  <!-- Neck / collar -->
  <rect x="13" y="13" width="6" height="4" rx="1" fill="#f4c2a1"/>
  <!-- Head -->
  <ellipse cx="16" cy="9" rx="9" ry="9" fill="#f4c2a1"/>
  <!-- Hard hat brim -->
  <rect x="4" y="4" width="24" height="3" rx="1" fill="#d35400"/>
  <!-- Hard hat dome -->
  <ellipse cx="16" cy="3" rx="11" ry="4" fill="#e67e22"/>
  <!-- Eyes (whites) -->
  <ellipse cx="12" cy="9" rx="2.5" ry="2.5" fill="white"/>
  <ellipse cx="20" cy="9" rx="2.5" ry="2.5" fill="white"/>
  <!-- Pupils -->
  <circle cx="12" cy="10" r="1.5" fill="#1a0a00"/>
  <circle cx="20" cy="10" r="1.5" fill="#1a0a00"/>
  <!-- Eye shine -->
  <circle cx="12.6" cy="9.2" r="0.6" fill="white"/>
  <circle cx="20.6" cy="9.2" r="0.6" fill="white"/>
  <!-- Worried mouth -->
  <path d="M13 13 Q16 11.5 19 13" stroke="#8c6040" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
